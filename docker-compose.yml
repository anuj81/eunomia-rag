# Qdrant vector store for eunomia-rag.
#
#   docker-compose up -d qdrant     # start (or `docker compose up -d qdrant` on newer Docker)
#   docker-compose logs -f qdrant   # tail
#   docker-compose down             # stop (data persists in qdrant_data volume)
#
# Default exposed ports:
#   6333 — REST + dashboard (http://localhost:6333/dashboard)
#   6334 — gRPC (unused; we hit REST)

version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: eunomia-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      # Keep telemetry off in dev.
      QDRANT__TELEMETRY_DISABLED: "true"

volumes:
  qdrant_data:
    driver: local
